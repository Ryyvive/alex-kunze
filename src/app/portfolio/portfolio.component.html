<div class="card">
  <div class="card-body">
    <h2 class="card-title">Portfolio — Sport Results</h2>

    <form (ngSubmit)="addEntry()" class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Sport</label>
        <input class="form-control" name="sport" [(ngModel)]="model.sport" required />
      </div>
      <div class="col-md-2">
        <label class="form-label">Distance</label>
        <input class="form-control" name="distance" [(ngModel)]="model.distance" />
      </div>
      <div class="col-md-2">
        <label class="form-label">Time</label>
        <input class="form-control" name="time" [(ngModel)]="model.time" />
      </div>
      <div class="col-md-2">
        <label class="form-label">Result</label>
        <input class="form-control" name="result" [(ngModel)]="model.result" />
      </div>
      <div class="col-md-2">
        <label class="form-label">Result AK</label>
        <input class="form-control" name="resultAk" [(ngModel)]="model.resultAk" />
      </div>

      <div class="col-12">
        <label class="form-label">Link</label>
        <input class="form-control" name="link" [(ngModel)]="model.link" placeholder="https://..." />
      </div>

      <div class="col-12">
        <button class="btn btn-primary me-2" type="submit">Add</button>
        <button class="btn btn-outline-secondary" type="button" (click)="exportJson()">Export JSON</button>
      </div>
    </form>

    <hr />

    <div *ngIf="entries.length === 0" class="text-muted">No entries yet.</div>

    <div *ngIf="entries.length > 0" class="table-responsive">
      <table class="table table-sm">
        <thead>
          <tr>
            <th>Sport</th>
            <th>Distance</th>
            <th>Time</th>
            <th>Result</th>
            <th>Result AK</th>
            <th>Link</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of entries; let i = index">
            <td>{{ e.sport }}</td>
            <td>{{ e.distance }}</td>
            <td>{{ e.time }}</td>
            <td>{{ e.result }}</td>
            <td>{{ e.resultAk }}</td>
            <td>
              <a *ngIf="e.link" [href]="e.link" target="_blank" rel="noopener">Open</a>
            </td>
            <td><button class="btn btn-sm btn-outline-danger" (click)="deleteEntry(i)">Delete</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
