<div class="card">
  <div class="card-body">
    <h2 class="card-title">Portfolio — Sport Results</h2>
    <p class="text-muted">Results are stored in repository (src/assets/portfolio.json) and displayed here read-only.</p>

    <div *ngIf="loading" class="text-center py-3">Loading…</div>
    <div *ngIf="!loading && entries.length === 0" class="text-muted">No entries to show.</div>

    <div *ngIf="entries.length > 0" class="table-responsive">
      <table class="table table-sm">
        <thead>
          <tr>
            <th>Sport</th>
            <th>Distance</th>
            <th>Time</th>
            <th>Result</th>
            <th>Result AK</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of entries">
            <td>{{ e.sport }}</td>
            <td>{{ e.distance }}</td>
            <td>{{ e.time }}</td>
            <td>{{ e.result }}</td>
            <td>{{ e.resultAk }}</td>
            <td>
              <a *ngIf="e.link" [href]="e.link" target="_blank" rel="noopener">Open</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
